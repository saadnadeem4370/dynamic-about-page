<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>

    <link rel="stylesheet" href="style.css">

    <style>
        .admin-container{
            max-width:1200px;
            margin:40px auto;
            padding:20px;
        }

        .admin-form{
            background:white;
            padding:25px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,.1);
            margin-bottom:30px;
        }

        .admin-form input,
        .admin-form textarea{
            width:100%;
            padding:12px;
            margin-bottom:12px;
            border:1px solid #ddd;
            border-radius:8px;
        }

        .admin-form button{
            background:#2563eb;
            color:white;
            border:none;
            padding:12px 20px;
            border-radius:8px;
            cursor:pointer;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        table th,
        table td{
            padding:12px;
            border:1px solid #ddd;
            text-align:left;
        }

        .edit-btn{
            background:orange;
            color:white;
            border:none;
            padding:8px 12px;
            cursor:pointer;
            border-radius:6px;
        }

        .delete-btn{
            background:red;
            color:white;
            border:none;
            padding:8px 12px;
            cursor:pointer;
            border-radius:6px;
        }
    </style>

</head>
<body>

<header>
    <div class="logo">Admin Panel</div>

    <a href="index.html" class="admin-btn">
        Back To Website
    </a>
</header>

<div class="admin-container">

    <div class="admin-form">

        <h2>Manage Team Members</h2>

        <input
            type="hidden"
            id="memberId"
        >

        <input
            type="text"
            id="name"
            placeholder="Name"
        >

        <input
            type="text"
            id="role"
            placeholder="Role"
        >

        <input
            type="text"
            id="image"
            placeholder="Image URL"
        >

        <textarea
            id="bio"
            placeholder="Bio"
        ></textarea>

        <input
            type="text"
            id="linkedin"
            placeholder="LinkedIn URL"
        >

        <input
            type="text"
            id="github"
            placeholder="GitHub URL"
        >

        <button id="saveBtn">
            Add Member
        </button>

    </div>

    <table>

        <thead>
            <tr>
                <th>Name</th>
                <th>Role</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody id="memberTable">
        </tbody>

    </table>

</div>

<script src="admin.js"></script>

</body>
</html>
